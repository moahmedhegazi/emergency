<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Can You Forgive Me, Amira?</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    text-align:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom,#ffccd5,#ffe6f0);
    transition:0.3s;
}

h1{
    margin-top:100px;
    font-size:42px;
}

#attempts{
    font-size:18px;
    margin-top:10px;
    color:#444;
}

button{
    font-size:22px;
    padding:15px 35px;
    cursor:pointer;
    border:none;
    border-radius:15px;
    transition:0.3s;
}

#yes{
    background:#4CAF50;
    color:white;
    position:relative;
}

#no{
    background:#f44336;
    color:white;
    position:absolute;
}

#message{
    display:none;
    font-size:40px;
    color:#e60073;
    margin-top:200px;
}

#warning, #boss{
    display:none;
    position:fixed;
    top:35%;
    left:50%;
    transform:translateX(-50%);
    font-size:35px;
    background:white;
    padding:20px 40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    z-index:999;
}

#warning img{
    width:200px;
    display:block;
    margin:10px auto 0;
}

#boss{
    background:black;
    color:red;
    font-size:50px;
    padding:40px 60px;
}

.dark{
    background:black !important;
}

.shake{
    animation:shake 0.3s infinite;
}
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-10px);}
    50%{transform:translateX(10px);}
    75%{transform:translateX(-10px);}
    100%{transform:translateX(0);}
}

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation:float 6s linear infinite;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<h1>Can you forgive me, Amira? 💔</h1>
<div id="attempts">Don't even try to press NO 😏</div>

<div style="margin-top:50px;">
<button id="yes">Yes ❤️</button>
<button id="no">No 💔</button>
</div>

<div id="message"></div>

<div id="warning">
Don't mess with me 😎
<img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ291amJraTRkMGNyNGZ0NWh5MWg3NWdldmN1eXcybGRhaTdkcjZucyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l0Iy7k21Sw2LUkDkc/giphy.gif">
</div>

<div id="boss">
FINAL WARNING 😈
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const message = document.getElementById("message");
const attemptsText = document.getElementById("attempts");
const warning = document.getElementById("warning");
const boss = document.getElementById("boss");

let attempts = 0;
let yesScale = 1;

function moveNoButton() {

    attempts++;
    attemptsText.innerHTML = "Seriously Amira? Attempt #" + attempts + " 😅";

    // Attempt 3 → Funny warning
    if(attempts === 3){
        warning.style.display="block";
        setTimeout(()=>{ warning.style.display="none"; },2000);
    }

    // Attempt 5 → Boss Mode
    if(attempts === 5){
        document.body.classList.add("dark","shake");
        boss.style.display="block";

        if(navigator.vibrate){
            navigator.vibrate([200,100,200]);
        }

        setTimeout(()=>{
            document.body.classList.remove("dark","shake");
            boss.style.display="none";
        },2000);
    }

    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const x = Math.random() * (window.innerWidth - btnWidth);
    const y = Math.random() * (window.innerHeight - btnHeight);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    yesScale += 0.25;
    yesBtn.style.transform = "scale(" + yesScale + ")";

    if(attempts >= 6){
        yesBtn.style.position="fixed";
        yesBtn.style.top="0";
        yesBtn.style.left="0";
        yesBtn.style.width="100vw";
        yesBtn.style.height="100vh";
        yesBtn.style.fontSize="60px";
        yesBtn.innerHTML="Just Press YES ❤️";
    }
}

noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveNoButton();
});

yesBtn.addEventListener("click", ()=>{
    yesBtn.style.display="none";
    noBtn.style.display="none";
    attemptsText.style.display="none";

    message.style.display="block";
    message.innerHTML = "Best Decision Ever Ya Ktkoty Love You 😍❤️🎉";

    const gif = document.createElement("img");
    gif.src = "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExYmhpMmpranB0ajQ4MXU2cGxrN29lODV5NnJ2cWRxbnF0anRidnR2aCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/xT9IgKWQeoclWggTDO/giphy.gif";
    gif.style.width = "250px";
    gif.style.marginTop = "20px";
    document.body.appendChild(gif);

    confetti({
        particleCount: 300,
        spread: 150,
        origin: { y: 0.6 }
    });
});

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*25+15)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHeart,400);
</script>

</body>
</html>
